version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Batman AI — Infrastructure Services (Docker)
#
# Only GPU/LLM services run here:
#   - ollama           → local LLM inference
#   - embedding-service → sentence-transformers + FAISS (GPU)
#
# MongoDB and Redis run locally on Windows.
# FastAPI backend runs locally in a Python venv.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # Ollama — Local LLM Server (GPU)
  ollama:
    image: ollama/ollama:latest
    container_name: batman-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Embedding Service — sentence-transformers + FAISS (GPU)
  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: batman-embedding
    restart: unless-stopped
    ports:
      - "8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - ollama

volumes:
  ollama_data:
